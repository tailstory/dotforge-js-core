name: Publish package

on:
  release:
    types: [published]

jobs:
  build:
    environment:
      name: npmjs
      url: https://www.npmjs.com/package/@dotforge/core/v/${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
          scope: '@dotforge'
      - run: npm ci
      - run: npm run build
      - run: npm publish
